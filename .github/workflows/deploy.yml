name: Deploy

on:
  push:
    branches: [main, master]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false # Don't cancel ongoing deployments

jobs:
  # ──────────────────────────────────────────────
  # Quick smoke test before deploying
  # ──────────────────────────────────────────────
  smoke-test:
    name: "Smoke Test"
    runs-on: ubuntu-latest
    env:
      SUPABASE_JWT_SECRET: "ci-test-secret-key-for-jwt-signing-32bytes"
      SUPABASE_URL: "https://test.supabase.co"
      SUPABASE_SERVICE_ROLE_KEY: "ci-test-service-key"
      SUPABASE_ANON_KEY: "ci-test-anon-key"
      GROQ_API_KEY: "ci-test-groq-key"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Backend startup check
        run: |
          cd backend && pip install -r requirements.txt
          python -c "from main import app; print('Backend OK')"

      - name: Frontend build check
        run: |
          cd frontend && npm ci --legacy-peer-deps
          npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL || 'https://test.supabase.co' }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY || 'test-key' }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL || 'http://localhost:8000' }}

  # ──────────────────────────────────────────────
  # Deploy Frontend to Vercel
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy: Frontend (Vercel)"
    needs: [smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      - name: Pull Vercel environment
        run: cd frontend && vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: cd frontend && vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        run: cd frontend && vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ──────────────────────────────────────────────
  # Deploy Backend to Railway
  # ──────────────────────────────────────────────
  deploy-backend:
    name: "Deploy: Backend (Railway)"
    needs: [smoke-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: cd backend && railway up --service ${{ secrets.RAILWAY_SERVICE_ID }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  # ──────────────────────────────────────────────
  # Post-deploy health check
  # ──────────────────────────────────────────────
  health-check:
    name: "Post-Deploy: Health Check"
    needs: [deploy-frontend, deploy-backend]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for services to start
        run: sleep 30
      - name: Check backend health
        if: ${{ secrets.BACKEND_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.BACKEND_URL }}/health)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed with status $STATUS"
            exit 1
          fi
          echo "Backend healthy"
      - name: Check frontend
        if: ${{ secrets.FRONTEND_URL != '' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.FRONTEND_URL }})
          if [ "$STATUS" -ge 500 ]; then
            echo "Frontend returned $STATUS"
            exit 1
          fi
          echo "Frontend healthy"
