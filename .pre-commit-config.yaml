repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock\.json|\.env\.example

  - repo: https://github.com/PyCQA/bandit
    rev: "1.9.0"
    hooks:
      - id: bandit
        args: ["-ll", "--exclude", "tests,venv"]
        files: \.py$
